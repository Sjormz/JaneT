name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux desktop test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: TypeScript check
        run: npm run typecheck

      - name: Run unit and component tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Run Electron e2e tests
        run: xvfb-run --auto-servernum npm run test:e2e

  durable-workspace-platforms:
    name: Durable workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Build app
        run: npm run build

      - name: Run durable workspace Electron tests
        run: npx playwright test --config playwright.config.ts tests/e2e/durable-workspace.spec.ts

      - name: Run startup command Electron test
        run: npx playwright test --config playwright.config.ts tests/e2e/pane-maximize.spec.ts --grep "runs ordered preset startup commands"
