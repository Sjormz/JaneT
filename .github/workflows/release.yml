name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to validate and publish, for example v0.2.1'
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux desktop test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Verify release tag matches package.json
        shell: bash
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: TypeScript check
        run: npm run typecheck

      - name: Run unit and component tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Run Electron e2e tests
        run: xvfb-run --auto-servernum npm run test:e2e

  package:
    name: Package (${{ matrix.os }})
    needs: [verify]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build-args: --linux
          - os: macos-latest
            platform: macos
            build-args: --mac -c.mac.identity=- -c.mac.hardenedRuntime=false -c.mac.notarize=false -c.npmRebuild=false
          - os: windows-latest
            platform: windows
            build-args: --win
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Verify release tag matches package.json
        shell: bash
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build app
        run: npm run build

      - name: Package installer
        run: npx electron-builder ${{ matrix.build-args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify packaged release and native terminal runtime
        run: node scripts/verify-release-artifacts.mjs ${{ matrix.platform }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.os }}-${{ env.RELEASE_TAG }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/*.dmg
            release/*.zip
            release/*.zip.blockmap
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          if-no-files-found: error

  publish:
    name: Update GitHub release
    needs: [package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: installer-*
          merge-multiple: false

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*/JaneT-Setup-*.exe
            release-artifacts/*/JaneT-Setup-*.exe.blockmap
            release-artifacts/*/JaneT-Portable-*.exe
            release-artifacts/*/JaneT-*-mac-*.dmg
            release-artifacts/*/JaneT-*-mac-*.zip
            release-artifacts/*/JaneT-*-mac-*.zip.blockmap
            release-artifacts/*/JaneT-*-linux-*.AppImage
            release-artifacts/*/JaneT-*-linux-*.deb
            release-artifacts/*/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
