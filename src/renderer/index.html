<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="application-name" content="JaneT" />
  <meta name="theme-color" content="#10121b" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:;" />
  <link rel="icon" type="image/svg+xml" href="../../assets/brand/app-icon.svg" />
  <script type="module">
    if (location.protocol !== 'file:') {
      import('/@react-refresh').then(({ default: RefreshRuntime }) => {
        RefreshRuntime.injectIntoGlobalHook(window);
        window.$RefreshReg$ = () => {};
        window.$RefreshSig$ = () => (type) => type;
        window.__vite_plugin_react_preamble_installed__ = true;
      });
    }
  </script>
  <title>JaneT — focused terminal workspace</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
